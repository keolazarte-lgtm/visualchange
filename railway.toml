# MagicVisual — Railway config
# Docs: https://docs.railway.app

[deploy]
# Railway detecta automáticamente Bun desde package.json
# Solo necesitamos decirle cuál es el comando de arranque
startCommand = "bun run index.ts"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# 512MB es suficiente para sharp + gradio client
# Si necesitás más, subilo a 1024
[deploy.resource]
memory = 512
cpu = 256
